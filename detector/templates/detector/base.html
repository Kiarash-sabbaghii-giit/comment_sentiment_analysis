<!-- detector/templates/detector/base.html -->
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SentimentAI Pro{% endblock %}</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* ============================================
                   RESET & BASE
                   ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
            direction: ltr;
        }

        /* ============================================
                   ANIMATED GRADIENT BACKGROUND
                   ============================================ */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-container .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: floatOrb 25s ease-in-out infinite alternate;
        }

        .bg-container .gradient-orb:nth-child(1) {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #7c3aed, #4f46e5);
            top: -20%;
            left: -10%;
            animation-delay: 0s;
        }

        .bg-container .gradient-orb:nth-child(2) {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #ec4899, #8b5cf6);
            bottom: -20%;
            right: -10%;
            animation-delay: -8s;
        }

        .bg-container .gradient-orb:nth-child(3) {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #06b6d4, #3b82f6);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -16s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            25% { transform: translate(80px, -60px) scale(1.1) rotate(5deg); }
            50% { transform: translate(-60px, 80px) scale(0.9) rotate(-5deg); }
            75% { transform: translate(40px, 40px) scale(1.05) rotate(3deg); }
            100% { transform: translate(-40px, -40px) scale(0.95) rotate(-3deg); }
        }

        /* ============================================
                   FLOATING PARTICLES
                   ============================================ */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, rgba(255,255,255,0.4), rgba(255,255,255,0));
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) scale(0) rotate(0deg);
                opacity: 0;
            }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% {
                transform: translateY(-10vh) scale(1) rotate(720deg);
                opacity: 0;
            }
        }

        /* ============================================
                   GLASS NAVBAR
                   ============================================ */
        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: calc(100% - 40px);
            max-width: 1200px;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(30px) saturate(1.5);
            -webkit-backdrop-filter: blur(30px) saturate(1.5);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 12px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .navbar.scrolled {
            top: 10px;
            background: rgba(10, 10, 15, 0.85);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
            font-size: 20px;
            font-weight: 800;
            transition: all 0.3s ease;
        }

        .navbar-brand:hover {
            transform: scale(1.05);
        }

        .navbar-brand .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
            animation: pulseLogo 3s ease-in-out infinite;
            position: relative;
        }

        .navbar-brand .logo-icon::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 16px;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            opacity: 0.3;
            filter: blur(10px);
            z-index: -1;
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        .navbar-brand span {
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 22px;
        }

        .navbar-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(59, 130, 246, 0.2));
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: white;
            transform: translateY(-2px);
        }

        .nav-link:hover::before {
            opacity: 1;
            transform: scale(1);
        }

        .nav-link.active {
            color: white;
        }

        .nav-link.active::before {
            opacity: 1;
            transform: scale(1);
        }

        .nav-link .badge {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 700;
            animation: pulseBadge 2s ease-in-out infinite;
        }

        @keyframes pulseBadge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .nav-link i {
            font-size: 16px;
            transition: transform 0.3s ease;
        }

        .nav-link:hover i {
            transform: translateY(-2px) scale(1.1);
        }

        /* ===== MENU TOGGLE ===== */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            transition: all 0.3s ease;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
        }

        .menu-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }

        /* ============================================
                   MAIN CONTENT
                   ============================================ */
        .main-content {
            position: relative;
            z-index: 1;
            padding-top: 100px;
            padding-bottom: 40px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-left: 20px;
            padding-right: 20px;
        }

        .container {
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ============================================
                   GLASS CARD
                   ============================================ */
        .glass-card {
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(40px) saturate(1.5);
            -webkit-backdrop-filter: blur(40px) saturate(1.5);
            border-radius: 32px;
            padding: 45px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(124, 58, 237, 0.03), transparent 60%);
            pointer-events: none;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            border-color: rgba(124, 58, 237, 0.15);
        }

        /* ============================================
                   SCROLLBAR
                   ============================================ */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #7c3aed, #3b82f6);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #6d28d9, #2563eb);
        }

        /* ============================================
                   RESPONSIVE
                   ============================================ */
        @media (max-width: 768px) {
            .navbar {
                top: 10px;
                padding: 10px 16px;
                border-radius: 18px;
                width: calc(100% - 20px);
            }

            .navbar-brand span {
                font-size: 17px;
            }

            .navbar-brand .logo-icon {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }

            .menu-toggle {
                display: block;
            }

            .navbar-links {
                position: absolute;
                top: 70px;
                left: 10px;
                right: 10px;
                background: rgba(10, 10, 15, 0.95);
                backdrop-filter: blur(30px);
                -webkit-backdrop-filter: blur(30px);
                flex-direction: column;
                padding: 12px;
                gap: 4px;
                border-radius: 18px;
                border: 1px solid rgba(255, 255, 255, 0.06);
                transform: translateY(-20px) scale(0.95);
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                opacity: 0;
                pointer-events: none;
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            }

            .navbar-links.open {
                transform: translateY(0) scale(1);
                opacity: 1;
                pointer-events: all;
            }

            .nav-link {
                width: 100%;
                padding: 12px 16px;
                justify-content: center;
            }

            .main-content {
                padding-top: 85px;
                padding-left: 10px;
                padding-right: 10px;
            }

            .glass-card {
                padding: 28px 20px;
                border-radius: 24px;
            }

            .bg-container .gradient-orb:nth-child(1) {
                width: 300px;
                height: 300px;
            }

            .bg-container .gradient-orb:nth-child(2) {
                width: 250px;
                height: 250px;
            }

            .bg-container .gradient-orb:nth-child(3) {
                width: 200px;
                height: 200px;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                padding: 8px 12px;
            }

            .navbar-brand span {
                font-size: 15px;
            }

            .glass-card {
                padding: 20px 16px;
                border-radius: 20px;
            }

            .main-content {
                padding-top: 75px;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- ===== BACKGROUND ===== -->
    <div class="bg-container">
        <div class="gradient-orb"></div>
        <div class="gradient-orb"></div>
        <div class="gradient-orb"></div>
    </div>

    <!-- ===== PARTICLES ===== -->
    <div class="particles-container" id="particles"></div>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar" id="navbar">
        <a href="{% url 'detector:index' %}" class="navbar-brand">
            <div class="logo-icon">
                <i class="fas fa-brain"></i>
            </div>
            <span>SentimentAI</span>
        </a>

        <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
            <i class="fas fa-bars"></i>
        </button>

        <div class="navbar-links" id="navLinks">
            <a href="{% url 'detector:index' %}" class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="{% url 'detector:history' %}" class="nav-link {% if request.resolver_match.url_name == 'history' %}active{% endif %}">
                <i class="fas fa-clock-rotate-left"></i>
                <span>History</span>
                <span class="badge" id="historyBadge">0</span>
            </a>
            <a href="{% url 'detector:about' %}" class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}">
                <i class="fas fa-info-circle"></i>
                <span>About</span>
            </a>
        </div>
    </nav>

    <!-- ===== MAIN ===== -->
    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- ===== SCRIPTS ===== -->
    <script>
        // ===== PARTICLES =====
        (function createParticles() {
            const container = document.getElementById('particles');
            const count = 40;

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.animationDuration = (Math.random() * 25 + 15) + 's';
                particle.style.animationDelay = (Math.random() * 25) + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.1;
                container.appendChild(particle);
            }
        })();

        // ===== NAVBAR SCROLL =====
        const navbar = document.getElementById('navbar');
        let lastScroll = 0;

        window.addEventListener('scroll', function() {
            const currentScroll = window.pageYOffset;

            if (currentScroll > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }

            lastScroll = currentScroll;
        });

        // ===== MOBILE MENU =====
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');

        menuToggle.addEventListener('click', function() {
            navLinks.classList.toggle('open');
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-xmark');
        });

        // ===== CLOSE MENU ON LINK CLICK =====
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('open');
                const icon = menuToggle.querySelector('i');
                icon.classList.add('fa-bars');
                icon.classList.remove('fa-xmark');
            });
        });

        // ===== HISTORY BADGE =====
        function updateHistoryBadge() {
            const history = JSON.parse(localStorage.getItem('commentHistory') || '[]');
            const badge = document.getElementById('historyBadge');
            if (badge) {
                const count = history.length;
                badge.textContent = count;
                badge.style.display = count > 0 ? 'inline' : 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', updateHistoryBadge);

        console.log('🚀 SentimentAI Pro loaded!');
        console.log('💡 Features: Sentiment Analysis, Dark Theme, Animations');
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
